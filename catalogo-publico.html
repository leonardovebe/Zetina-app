<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#16001C">
  <meta name="description" content="Catálogo público ZETINA">
  <title>Catálogo ZETINA</title>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/catalogo-publico.css">
</head>
<body>
  <header class="cp-header">
    <img src="logopngBLANCO.png" alt="ZETINA" class="cp-logo">
  </header>

  <h1 class="cp-titulo" id="cpTitulo">Cargando…</h1>

  <div class="cp-tabs" id="cpTabs" hidden>
    <button class="cp-tab cp-tab--activo" data-tab="catalogo" id="cpTabCatalogo">Catálogo</button>
    <button class="cp-tab" data-tab="disponible" id="cpTabDisponible">Disponible ahora</button>
  </div>

  <div id="cpContenido">
    <p class="cp-loading">Cargando catálogo…</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/catalogo-publico.js" defer></script>
</body>
</html>
