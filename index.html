<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#130016">
  <meta name="description" content="ZETINA — App para vendedoras por catálogo">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ZETINA">
  <title>ZETINA</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <!-- OneSignal Push Notifications -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <style>
    /* Ocultar campanita de OneSignal permanentemente */
    .onesignal-bell-container,
    #onesignal-bell-container { display: none !important; }
  </style>
  <script>
    /* ── Lógica de reintento tras rechazo ─────────────────────────────────
     * Si la vendedora toca "Ahora no", se guarda la marca de tiempo en
     * localStorage. El prompt vuelve a aparecer 24 h después (86 400 s).
     * Si ya concedió o denegó el permiso nativo, no se vuelve a mostrar.
     * ─────────────────────────────────────────────────────────────────── */
    var _NOTIF_KEY  = 'zetina_notif_dismissed';
    var _RETRY_MS   = 86400000; // 24 h en ms

    function _canPrompt() {
      var perm = (typeof Notification !== 'undefined') ? Notification.permission : 'default';
      if (perm !== 'default') return false;          // ya decidió
      var ts = localStorage.getItem(_NOTIF_KEY);
      return !ts || (Date.now() - Number(ts)) >= _RETRY_MS;
    }

    /* ── Colores y estilos del slidedown ──────────────────────────────── */
    (function () {
      var C = {
        bg:        '#130016',
        title:     '#ffffff',
        msg:       '#DEFF00',
        btnOk:     '#DEFF00',
        btnOkTxt:  '#130016',
        btnNo:     '#855AA2',
        btnNoTxt:  '#ffffff',
      };

      var ALLOW_SEL  = '#onesignal-slidedown-allow-button,  button.primary,   [id*="allow"]';
      var CANCEL_SEL = '#onesignal-slidedown-cancel-button, button.secondary, [id*="cancel"]';
      var MSG_SEL    = '.slidedown-body-message, [class*="message"], p';

      var _cancelListened = false;

      function paint(root) {
        /* Fondo en root y en todos los divs hijos */
        root.style.setProperty('background-color', C.bg, 'important');
        root.querySelectorAll('div').forEach(function (el) {
          el.style.setProperty('background-color', C.bg, 'important');
        });

        /* Texto base blanco */
        root.querySelectorAll('span, p, h1, h2, h3, h4, label, small').forEach(function (el) {
          el.style.setProperty('color', C.title, 'important');
        });

        /* Texto del mensaje en amarillo */
        var msg = root.querySelector(MSG_SEL);
        if (msg) msg.style.setProperty('color', C.msg, 'important');

        /* Botón Activar */
        var allow = root.querySelector(ALLOW_SEL);
        if (allow) {
          allow.style.setProperty('background-color', C.btnOk,    'important');
          allow.style.setProperty('color',            C.btnOkTxt, 'important');
          allow.style.setProperty('border-color',     C.btnOk,    'important');
          allow.querySelectorAll('*').forEach(function (el) {
            el.style.setProperty('background-color', C.btnOk,    'important');
            el.style.setProperty('color',            C.btnOkTxt, 'important');
          });
        }

        /* Botón Ahora no */
        var cancelBtn = root.querySelector(CANCEL_SEL);
        if (cancelBtn) {
          cancelBtn.style.setProperty('background-color', C.btnNo,    'important');
          cancelBtn.style.setProperty('color',            C.btnNoTxt, 'important');
          cancelBtn.style.setProperty('border-color',     C.btnNo,    'important');
          cancelBtn.querySelectorAll('*').forEach(function (el) {
            el.style.setProperty('background-color', C.btnNo,    'important');
            el.style.setProperty('color',            C.btnNoTxt, 'important');
          });

          /* Listener de rechazo — se adjunta una sola vez */
          if (!_cancelListened) {
            _cancelListened = true;
            cancelBtn.addEventListener('click', function () {
              localStorage.setItem(_NOTIF_KEY, String(Date.now()));
            }, { once: true });
          }
        }
      }

      new MutationObserver(function (_, obs) {
        var root = document.querySelector(
          '#onesignal-slidedown-container, .onesignal-slidedown-container, ' +
          '[id*="onesignal-slidedown"], [class*="onesignal-slidedown"]'
        );
        if (!root) return;
        obs.disconnect();
        paint(root);
        [200, 600, 1200].forEach(function (ms) {
          setTimeout(function () { paint(root); }, ms);
        });
      }).observe(document.documentElement, { childList: true, subtree: true });
    })();

    /* ── Inicialización de OneSignal ──────────────────────────────────── */
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function (OneSignal) {
      await OneSignal.init({
        appId: "a2f3738d-e19b-4555-8eaa-02986bd16437",
        safari_web_id: "web.onesignal.auto.28be2e0f-48c0-43fd-877a-95cc3c6fc0d9",
        promptOptions: {
          slidedown: {
            prompts: [{
              type: "push",
              autoPrompt: false,
              text: {
                actionMessage: "Activa las notificaciones, ¡no te pierdas las mejores prendas!",
                acceptButton: "Activar",
                cancelButton: "Ahora no"
              }
            }]
          }
        },
        notifyButton: { enable: false },
      });

      /* Badge: actualizar desde notificaciones en primer plano */
      OneSignal.Notifications.addEventListener('foregroundWillDisplay', (e) => {
        const count = e.notification.additionalData?.badge_count;
        if (typeof count === 'number' && 'setAppBadge' in navigator) {
          navigator.setAppBadge(count);
        }
      });

      /* Muestra el slidedown a los 60 s.
         Solo si el permiso no fue decidido y no fue rechazado en las últimas 24 h. */
      setTimeout(async () => {
        if (_canPrompt()) {
          try { await OneSignal.Slidedown.promptPush(); } catch (e) {}
        }
      }, 60000);
    });
  </script>
</head>
<body>
  <header class="app-header">
    <div class="header-spacer"></div>
    <div class="header-brand">
      <img src="logopngBLANCO.png" alt="ZETINA" class="logo-img">
    </div>
    <div class="header-actions">
      <button class="cart-btn" id="cartBtn" hidden aria-label="Ver carrito">
        <svg class="cart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="cart-badge" id="cartBadge"></span>
      </button>
    </div>
  </header>

  <main class="app-main">
    <section id="catalogo" class="view active" aria-labelledby="nav-catalogo">
      <div class="view-content"></div>
    </section>
    <section id="pedidos" class="view" aria-labelledby="nav-pedidos" hidden>
      <div class="view-content"></div>
    </section>
    <section id="clientes" class="view" aria-labelledby="nav-clientes" hidden>
      <div class="view-content"></div>
    </section>
    <section id="cobros" class="view" aria-labelledby="nav-cobros" hidden>
      <div class="view-content"></div>
    </section>
    <section id="prendas" class="view" aria-labelledby="nav-prendas" hidden>
      <div class="view-content"></div>
    </section>
    <section id="cuenta" class="view" aria-labelledby="nav-cuenta" hidden>
      <div class="view-content"></div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="Navegación principal">
    <a href="#catalogo" id="nav-catalogo" class="nav-item active" data-view="catalogo">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9 3h6" />
        <path d="M9 3l-3 5h12l-3-5" />
        <path d="M6 8l-3 13h18l-3-13" />
      </svg>
      <span class="nav-label">Catálogo</span>
    </a>
    <a href="#pedidos" id="nav-pedidos" class="nav-item" data-view="pedidos">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
        <line x1="12" y1="22.08" x2="12" y2="12"/>
      </svg>
      <span class="nav-label">Pedidos</span>
    </a>
    <a href="#clientes" id="nav-clientes" class="nav-item" data-view="clientes">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      <span class="nav-label">Clientes</span>
    </a>
    <a href="#cobros" id="nav-cobros" class="nav-item" data-view="cobros">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="6" width="20" height="12" rx="2"/>
        <circle cx="12" cy="12" r="2.5"/>
        <path d="M6 12h.01M18 12h.01"/>
      </svg>
      <span class="nav-label">Cuentas</span>
    </a>
    <a href="#prendas" id="nav-prendas" class="nav-item" data-view="prendas">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      <span class="nav-label">Mis Prendas</span>
    </a>
    <a href="#cuenta" id="nav-cuenta" class="nav-item" data-view="cuenta">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="9" r="3"/>
        <path d="M6.17 18.82A6 6 0 0 1 12 15a6 6 0 0 1 5.83 3.82"/>
      </svg>
      <span class="nav-label">Cuenta</span>
    </a>
  </nav>

  <!-- Pantalla de cambio de contraseña temporal — se muestra tras primer login -->
  <div id="changePasswordScreen" class="login-screen login-hidden">
    <div class="login-inner">
      <div class="login-brand">
        <img src="logopngBLANCO.png" alt="ZETINA" class="login-logo">
      </div>
      <form id="changePasswordForm" class="login-form" novalidate autocomplete="off">
        <p class="login-welcome">Elige tu contraseña</p>
        <p class="chpass-hint">Por seguridad, crea una contraseña personal antes de continuar.</p>
        <div class="login-fields">
          <div class="login-field-wrap">
            <label class="login-label" for="newPassword">Nueva contraseña</label>
            <input class="login-input" type="password" id="newPassword"
                   autocomplete="new-password" placeholder="Mínimo 6 caracteres">
          </div>
          <div class="login-field-wrap">
            <label class="login-label" for="confirmPassword">Confirmar contraseña</label>
            <input class="login-input" type="password" id="confirmPassword"
                   autocomplete="new-password" placeholder="Repite tu contraseña">
          </div>
        </div>
        <p class="login-error" id="changePasswordError"></p>
        <button type="submit" class="login-submit" id="changePasswordBtn">Guardar contraseña</button>
      </form>
    </div>
  </div>

  <!-- Pantalla de login — visible por defecto, se oculta al autenticar -->
  <div id="loginScreen" class="login-screen">
    <div class="login-inner">
      <div class="login-brand">
        <img src="logopngBLANCO.png" alt="ZETINA" class="login-logo">
      </div>
      <form id="loginForm" class="login-form" novalidate autocomplete="on">
        <p class="login-welcome">Bienvenida(o)</p>
        <div class="login-fields">
          <div class="login-field-wrap">
            <label class="login-label" for="loginEmail">Correo electrónico</label>
            <input class="login-input" type="email" id="loginEmail"
                   name="email" autocomplete="email" inputmode="email"
                   placeholder="tu@correo.com">
          </div>
          <div class="login-field-wrap">
            <label class="login-label" for="loginPassword">Contraseña</label>
            <input class="login-input" type="password" id="loginPassword"
                   name="password" autocomplete="current-password"
                   placeholder="••••••••">
          </div>
        </div>
        <p class="login-error" id="loginError"></p>
        <button type="submit" class="login-submit" id="loginBtn">Iniciar sesión</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/app.js" defer></script>
</body>
</html>
